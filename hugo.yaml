# Hugo configuration file
title: Guilherme Araújo

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: GitHub
      url: "https://github.com/araujogui"
      weight: 1
      params:
        icon: github
    - name: LinkedIn
      url: "https://linkedin.com/in/araujo-guilherme2"
      weight: 2
      params:
        icon: linkedin

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: false
